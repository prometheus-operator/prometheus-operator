name: unit
on:
  pull_request:
  push:
    branches:
      - 'release-*'
      - 'master'
      - 'main'
    tags:
      - 'v*'
jobs:
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      non-md: ${{ steps.changes.outputs.non-md }}
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Get changed files other than .md
        id: changes
        run: |
          echo "::set-output name=non-md::$(git diff --name-only --diff-filter=ACMRT ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -qv '\.md$' | xargs)"
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests
    needs: changed-files
    if: ${{ needs.changed-files.outputs.non-md }}
    steps:
    - uses: actions/checkout@v4
    - name: Import environment variables from file
      run: cat ".github/env" >> $GITHUB_ENV
    - uses: actions/setup-go@v5
      with:
        go-version: '${{ env.golang-version }}'
        check-latest: true
    - run: make test-unit
  extended-tests:
    runs-on: ubuntu-latest
    name: Extended tests
    needs: changed-files
    if: ${{ needs.changed-files.outputs.non-md }}
    steps:
    - uses: actions/checkout@v4
    - name: Import environment variables from file
      run: cat ".github/env" >> $GITHUB_ENV
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.golang-version }}
        check-latest: true
    - run: make test-long
